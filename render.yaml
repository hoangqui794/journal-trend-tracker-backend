

envVarGroups:
  - name: backend-env
    envVars:
      - key: ConnectionStrings__AdminConnection
        sync: false
      - key: ConnectionStrings__TrendConnection
        sync: false
      - key: ConnectionStrings__PaperConnection
        sync: false
      - key: ConnectionStrings__UserConnection
        sync: false
      - key: ConnectionStrings__AuthConnection
        sync: false
      - key: Services__IdentityBaseUrl
        value: https://identity-service-6r7e.onrender.com
      - key: Services__IdentityService
        value: https://identity-service-6r7e.onrender.com
      - key: Services__PaperBaseUrl
        value: https://prn-paperservice.onrender.com
      - key: ServiceUrls__PaperService
        value: https://prn-paperservice.onrender.com
      - key: ServiceUrls__TrendService
        value: https://trend-service-ab5q.onrender.com
      - key: ServiceUrls__UserService
        value: https://user-service-rje9.onrender.com
      - key: Services__AdminBaseUrl
        value: https://admin-service-y388.onrender.com
      - key: ServiceUrls__AdminService
        value: https://admin-service-y388.onrender.com
      - key: ServiceUrls__Gateway
        value: https://api-gateway-999k.onrender.com
      - key: PORT
        value: 8080
      - key: ASPNETCORE_HTTP_PORTS
        value: 8080

services:
  - type: web
    name: api-gateway
    env: docker
    dockerContext: ./API_Gateway/ApiGateway
    dockerfilePath: ./API_Gateway/ApiGateway/Dockerfile
    plan: free
    envVars:
      - fromGroup: backend-env

  - type: web
    name: identity-service
    env: docker
    dockerContext: ./Services/IdentityService
    dockerfilePath: ./Services/IdentityService/Dockerfile
    plan: free
    envVars:
      - fromGroup: backend-env

  - type: web
    name: admin-service
    env: docker
    dockerContext: ./Services/AdminService
    dockerfilePath: ./Services/AdminService/Dockerfile
    plan: free
    envVars:
      - fromGroup: backend-env

  - type: web
    name: paper-service
    env: docker
    dockerContext: ./Services/PaperService
    dockerfilePath: ./Services/PaperService/Dockerfile
    plan: free
    envVars:
      - fromGroup: backend-env

  - type: web
    name: trend-service
    env: docker
    dockerContext: ./Services/TrendService
    dockerfilePath: ./Services/TrendService/Dockerfile
    plan: free
    envVars:
      - fromGroup: backend-env

  - type: web
    name: user-service
    env: docker
    dockerContext: ./Services/UserService
    dockerfilePath: ./Services/UserService/Dockerfile
    plan: free
    envVars:
      - fromGroup: backend-env
